<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SerpentineBorder vanilla fixture</title>
    <style>
      html, body { margin: 0; height: auto; min-height: 0; font-family: system-ui, sans-serif; }
      #root { padding: 16px; height: auto; }
      .fixture { width: 400px; height: 320px; overflow: visible; }
      .serpentine-wrapper { width: 100%; box-sizing: border-box; overflow: visible; }
      .section { height: 150px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: #333; color: #eee; box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./vanilla.js"></script>
  </body>
</html>
