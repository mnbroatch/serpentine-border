<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SerpentineBorder — height resize demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, sans-serif;
        background: #1a1b22;
        color: #e8e6e3;
      }
      #root {
        padding: 24px;
        max-width: 520px;
      }
      h1 {
        font-size: 1.15rem;
        font-weight: 600;
        margin: 0 0 8px;
      }
      .hint {
        margin: 0 0 20px;
        font-size: 0.9rem;
        color: #9a9790;
        line-height: 1.45;
      }
      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: center;
        margin-bottom: 20px;
        padding: 14px 16px;
        background: #25262e;
        border-radius: 10px;
      }
      .controls label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .controls button {
        cursor: pointer;
        padding: 8px 14px;
        border: none;
        border-radius: 6px;
        background: #3d7cff;
        color: #fff;
        font-size: 0.85rem;
      }
      .controls button:hover {
        background: #5a90ff;
      }
      .controls button.secondary {
        background: #44475a;
      }
      .controls button.secondary:hover {
        background: #555970;
      }
      .fixture {
        width: 100%;
        overflow: visible;
      }
      .serpentine-wrapper {
        width: 100%;
        overflow: visible;
      }
      .section {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        background: #2c2d36;
        color: #c9c6bf;
        border-bottom: 1px solid #3a3b46;
      }
      .section:last-child {
        border-bottom: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
